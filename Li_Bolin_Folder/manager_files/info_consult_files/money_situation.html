<!DOCTYPE html>
<html>
<head>
    <title>所有信息</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        pre {
            background: white;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading { color: #666; font-style: italic; }
        .header_size{
            font-size: 50px;
            font-weight: 700;
        }
        .button_size{
            font-size: 20px;
            font-weight: 500;
            padding: 12px 24px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading { color: #666; font-style: italic; }
        .header_size{
            font-size: 50px;
            font-weight: 700;
        }
        .middle{
            text-align: center;
        }
    </style>
</head>
    <body>
        <div class="middle">
            <div class="header_size">管 理 员 - 信 息 查 询 界 面 - 业 主 缴 费 情 况</div><br>
            <div id="content" class="loading">正在加载数据...</div>
            <button onclick="go_back()" class="button_size">返回上一界面</button><br><br>
        </div>
        <script>
            //页面加载时自动请求后端
            fetch('/api/payment_status')
                .then(response => {
                    if(!response.ok){
                        throw new Error('网络错误或后端未响应');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('content').innerHTML = '<pre>' + data + '</pre>';
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = 
                        '<img src="../crying.png" height="420"><br>' +
                        '<p style="color:red;">❌ 加载失败: ' + error.message + '</p>';
                });
            function go_back(){
                window.location.href='../info_consult.html'
            }
        </script>
    </body>
</html>
